; =====================
; === ИГРОК ===
; =====================

; Горизонтальная скорость перемещения игрока
horizontalSpeed = 4.0

; Начальный уровень негатива
initialNegative = 0

; Максимальный уровень негатива
maxNegative = 10

; Время полного заполнения шкалы
fillDuration = 6.0


; =====================
; === ПЛАТФОРМЫ ===
; =====================

; Сила прыжка от платформы
platformJumpForce = 6.0

; Фиксированная высота следующей платформы над игроком
singlePlatformHeightOffset = 12.0

; Насколько платформа может выходить за экран (0.0 - 0.5)
platformHorizontalOverflow = 0.3


; =====================
; === НАЧАЛЬНАЯ ЗЕМЛЯ ===
; =====================

; Высота, при которой начальная земля пропадает (в метрах)
destroyHeightThreshold = 2.0


; =====================
; === КАМЕРА ===
; =====================

; Скорость следования камеры (0 - 1)
cameraSmoothSpeed = 0.25


; =====================
; === СЧЕТ ===
; =====================

; Символ единицы измерения
distanceUnit = m

; Сколько сантиметров в одной Unity-единице
centimetersPerUnit = 40


; =====================
; === PROGRESS BAR ===
; =====================

; Ускорение в начале сегмента
progressbarAcceleration = 2.0

; Замедление в конце сегмента
progressbarDeceleration = 3.0

; Максимальная скорость
progressbarMaxSpeed = 5.0

; Буст при переходе на новый сегмент
progressbarSegmentSwitchBoost = 1.2


; =====================
; === СПОСОБНОСТИ ===
; =====================

; Сила двойного прыжка
doubleJumpForce = 6.0

; Сила рывка вверх
upDashForce = 12.0

; Скорость горизонтального перемещения
sideDashSpeed = 12.0

; Время действия SideDash
sideDashTime = 2.0

; Сила крика
screamForce = 4.0


; =====================
; === СТОИМОСТИ СПОСОБНОСТЕЙ ===
; =====================

doubleJumpResourceCost = 2
upDashResourceCost = 3
sideDashResourceCost = 1
screamResourceCost = 1


; =====================
; === UI СПОСОБНОСТЕЙ ===
; =====================

; Цвет затемнения иконки (RGBA 0-1)
pressedColor = 0.6,0.6,0.6,1.0

; Время действия затемнения
pressDuration = 0.1
